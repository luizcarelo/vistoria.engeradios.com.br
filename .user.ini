; Configurações do PHP que estavam no .htaccess
; Este método é compatível com servidores (FastCGI/FPM) e evita erros 500

; Aumentar limite de memória do PHP (IMPORTANTE para evitar erro de memória)
memory_limit = 512M

; LIMITES DE UPLOAD REMOVIDOS (ilimitado)
upload_max_filesize = 5000M
post_max_size = 5000M

; Aumentar tempo máximo de execução
max_execution_time = 600
max_input_time = 600

; Aumentar número máximo de arquivos por upload
max_file_uploads = 200

; Configurar timezone
date.timezone = "America/Sao_Paulo"

; Habilitar output buffering
output_buffering = On